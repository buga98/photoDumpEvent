<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>PhotoDump</title>
    <link rel="stylesheet" href="style.css">
   <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
   <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e91e63">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">
<style>
  body {
    opacity: 0;
    transition: opacity .25s ease;
  }
  body.loaded {
    opacity: 1;
  }
</style>
</head>
<body>
<div class="topbar" id="eventTitle"></div>

<div class="app">

  <!-- HOME -->
  <div id="homeTab" class="screen active">
<div class="feed-header glass">
<!-- HOME -->
<h2 id="homeTitle">Galerija uspomena 🤍</h2>
<p id="homeSubtitle">Svaka fotografija postaje dio uspomena</p>

  <div class="live-stats">
    <div>📸 <span id="livePhotoCount">0</span></div>
    <div>💌 <span id="liveDedicationCount">0</span></div>
    <div class="live-counter">
  ❤️ <span id="liveLikesCount">0</span>
</div>
  </div>
</div><br>
    <div id="feed" class="feed grid"></div>
  </div>

  <!-- UPLOAD -->
<div id="uploadTab" class="screen">

  <!-- HEADER -->
  <div class="upload-header glass">
<!-- UPLOAD -->
<h2 id="uploadTitle">Podijeli trenutak 📸</h2>
<p id="uploadSubtitle">Dodaj fotografiju i ostavi uspomenu</p>
  </div>

  <!-- UPLOAD OPTIONS -->
<div class="upload-actions">

  <label class="upload-card">
    <img src="kamera.png" class="upload-img">
    <div class="upload-text">Uhvati trenutak</div>
    <input type="file" accept="image/*" capture="environment" onchange="uploadFile(this.files)">
  </label>

  <label class="upload-card">
    <img src="galerija.png" class="upload-img">
    <div class="upload-text">Odaberi slike</div>
    <input type="file" accept="image/*" multiple onchange="uploadFile(this.files)">
  </label>

</div>

  <!-- DEDICATION -->
  <div class="dedication-card-modern">
    <textarea id="dedicationText" placeholder="Napiši posvetu"></textarea>
  </div>

  <button class="btn-primary" onclick="saveDedication()">
    💌 Dodaj posvetu
  </button>

</div>

  <!-- PROFILE -->
  <div id="profileTab" class="screen">
    <div class="profile-header glass">

<!-- PROFILE -->
<h2>
  <span id="welcome"></span> 🕊️
</h2>

<p id="profileSubtitle" class="profile-sub">
  Ovdje su tvoje fotografije
</p>

</div>
    <div id="gallery"></div>
  </div>

</div>
<div id="deleteModal" class="modal">
  <div class="delete-box">

    <h3>Želite li obrisati sliku?</h3>

    <div class="modal-actions">
      <button class="btn-danger" onclick="confirmDelete()">Da, obriši</button>
      <button class="btn-secondary" onclick="closeDelete()">Ne</button>      
    </div>

  </div>
</div>
<!-- 🔥 NAVBAR (ovo ti fali!) -->
<div class="navbar">
  <div class="nav-item active" onclick="switchScreen('home')">
    <img src="home.png">
  </div>

  <div class="nav-item" onclick="switchScreen('upload')">
    <img src="add.png">
  </div>

  <div class="nav-item" onclick="switchScreen('profile')">
    <img src="profile.png">
  </div>
</div>

<script type="module" src="script.js"></script>
<div id="toast"></div>

</body>
</html>
