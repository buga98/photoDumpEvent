<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>PhotoDump Admin</title>

  <link rel="stylesheet" href="login.css">
</head>

<body>

<div class="bg"></div>

<main class="login-page">

  <section class="login-card">

    <div class="logo">
      🔒
    </div>

    <h1>PhotoDump Admin</h1>

    <p class="subtitle">
      Prijava za organizatore i administratore
    </p>

    <div class="form-group">
      <label>Email</label>

      <input
        id="email"
        type="email"
        placeholder="admin@email.com"
        autocomplete="email"
      >
    </div>

    <div class="form-group">
      <label>Lozinka</label>

      <input
        id="password"
        type="password"
        placeholder="••••••••"
        autocomplete="current-password"
      >
    </div>

    <button id="loginBtn">
      Prijavi se 🚀
    </button>

    <button id="registerBtn" class="secondary-btn">
      Registracija
    </button>

    <p id="errorText"></p>

  </section>

</main>

<script type="module" src="login.js"></script>

</body>
</html>
