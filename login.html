<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>PhotoDump Admin</title>

  <link rel="stylesheet" href="login.css">
</head>

<body>

<div class="bg"></div>

<main class="login-page">

  <section class="login-card">

    <div class="logo" id="formLogo">
      🔒
    </div>

    <h1 id="formTitle">
      PhotoDump Admin
    </h1>

    <p class="subtitle" id="formSubtitle">
      Prijava za organizatore i administratore
    </p>


    <div id="loginForm">

      <div class="form-group">
        <label>Email</label>

        <input
          id="loginEmail"
          type="email"
          placeholder="admin@email.com"
          autocomplete="email"
        >
      </div>

      <div class="form-group">
        <label>Lozinka</label>

        <input
          id="loginPassword"
          type="password"
          placeholder="Minimalno 6 znakova"
          autocomplete="current-password"
        >
      </div>

      <button id="loginBtn">
        Prijavi se 🚀
      </button>

      <button id="showRegisterBtn" class="secondary-btn">
        Nemam račun — registracija
      </button>

    </div>

    
    <div id="registerForm" class="hidden">

      <div class="name-grid">

        <div class="form-group">
          <label>Ime</label>

          <input
            id="firstName"
            type="text"
            placeholder="Ivan"
            autocomplete="given-name"
          >
        </div>

        <div class="form-group">
          <label>Prezime</label>

          <input
            id="lastName"
            type="text"
            placeholder="Ivanović"
            autocomplete="family-name"
          >
        </div>

      </div>

      <div class="form-group">
        <label>Email</label>

        <input
          id="registerEmail"
          type="email"
          placeholder="ime@email.com"
          autocomplete="email"
        >
      </div>

      <div class="form-group">
        <label>Lozinka</label>

        <input
          id="registerPassword"
          type="password"
          placeholder="Minimalno 6 znakova"
          autocomplete="new-password"
        >
      </div>

      <button id="registerBtn">
        Kreiraj račun ✨
      </button>

      <button id="showLoginBtn" class="secondary-btn">
        Već imam račun — prijava
      </button>

    </div>

    <p id="errorText"></p>

  </section>

</main>

<script type="module" src="login.js"></script>

</body>
</html>
